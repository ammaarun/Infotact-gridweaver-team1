# =============================================================================
# GridWeaver Backend — Application Configuration
# =============================================================================
# Secrets are NEVER hardcoded here. All sensitive values must be provided via:
#   - Environment variables
#   - Docker secrets
#   - Kubernetes secrets
#   - Cloud secret managers (AWS SSM, GCP Secret Manager, etc.)
# =============================================================================

spring:
  application:
    name: gridweaver-backend

  # ---------------------------------------------------------------------------
  # Profile Activation — override via SPRING_PROFILES_ACTIVE env var
  # ---------------------------------------------------------------------------
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ---------------------------------------------------------------------------
  # JPA / Hibernate (shared defaults)
  # ---------------------------------------------------------------------------
  jpa:
    open-in-view: false           # Disable OSIV — prevents lazy-load issues in API layer
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false

  # ---------------------------------------------------------------------------
  # Jackson serialization defaults
  # ---------------------------------------------------------------------------
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: NON_NULL
    time-zone: UTC

  # ---------------------------------------------------------------------------
  # Redis (shared defaults — connection overridden per profile)
  # ---------------------------------------------------------------------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

  # ---------------------------------------------------------------------------
  # Cache
  # ---------------------------------------------------------------------------
  cache:
    type: redis
    redis:
      time-to-live: 600000        # 10 minutes default TTL (ms)
      cache-null-values: false

  # ---------------------------------------------------------------------------
  # WebSocket
  # ---------------------------------------------------------------------------
  websocket:
    allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# =============================================================================
# Server
# =============================================================================
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  http2:
    enabled: true
  error:
    include-message: never       # Never expose exception messages in default error body
    include-stacktrace: never
    include-binding-errors: never

# =============================================================================
# GridWeaver Application Properties
# =============================================================================
gridweaver:
  # JWT Configuration — NEVER hardcode actual secrets here
  jwt:
    secret: ${JWT_SECRET:ThisIsATemporaryDevSecretKeyThatMustBeChangedInProductionAndMustBe512Bits!!}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}       # 15 min (ms)
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days (ms)
    issuer: ${JWT_ISSUER:gridweaver}

  # CORS Configuration
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

  # Security
  security:
    bcrypt-strength: ${BCRYPT_STRENGTH:12}
    public-endpoints:
      - /api/v1/auth/**
      - /actuator/health
      - /actuator/info
      - /swagger-ui/**
      - /v3/api-docs/**
      - /ws/**

# =============================================================================
# Spring Actuator
# =============================================================================
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    loggers:
      enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    build:
      enabled: true

# =============================================================================
# SpringDoc / Swagger UI
# =============================================================================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# =============================================================================
# Logging (shared defaults)
# =============================================================================
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.gridweaver: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
# =============================================================================
# DEVELOPMENT PROFILE (H2 in-memory)
# =============================================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:gridweaverdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  # Redis optional in dev — use embedded or skip if not available
  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: simple    # Use simple in-memory cache in dev if Redis not available

logging:
  level:
    com.gridweaver: DEBUG
    org.hibernate.SQL: DEBUG

management:
  health:
    redis:
      enabled: false

---
# =============================================================================
# PRODUCTION PROFILE (PostgreSQL + Redis)
# =============================================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: GridWeaverHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate            # Never auto-create in prod — use Flyway
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

  cache:
    type: redis

logging:
  level:
    root: WARN
    com.gridweaver: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

server:
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
