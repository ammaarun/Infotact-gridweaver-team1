# =============================================================================
# GridWeaver — Docker Compose
# =============================================================================
# Services:
#   gridweaver-app  — Spring Boot backend (port 8080)
#   postgres        — PostgreSQL 16 database (port 5432)
#   redis           — Redis 7 cache/session store (port 6379)
#   adminer         — Database GUI (port 8081, dev only)
#
# Usage:
#   Development:  docker compose up
#   Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# IMPORTANT: Copy .env.example to .env and fill in all values before running.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: gridweaver-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-gridweaverdb}
      POSTGRES_USER:     ${POSTGRES_USER:-gridweaver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gridweaver}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gridweaver-net

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: gridweaver-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - gridweaver-net

  # ---------------------------------------------------------------------------
  # GridWeaver Spring Boot Application
  # ---------------------------------------------------------------------------
  gridweaver-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gridweaver-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE:       ${SPRING_PROFILES_ACTIVE:-prod}
      DATABASE_URL:                  jdbc:postgresql://postgres:5432/${POSTGRES_DB:-gridweaverdb}
      DATABASE_USERNAME:             ${POSTGRES_USER:-gridweaver}
      DATABASE_PASSWORD:             ${POSTGRES_PASSWORD:?}
      REDIS_HOST:                    redis
      REDIS_PORT:                    6379
      REDIS_PASSWORD:                ${REDIS_PASSWORD:-}
      JWT_SECRET:                    ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_ACCESS_EXPIRATION:         ${JWT_ACCESS_EXPIRATION:-900000}
      JWT_REFRESH_EXPIRATION:        ${JWT_REFRESH_EXPIRATION:-604800000}
      JWT_ISSUER:                    ${JWT_ISSUER:-gridweaver}
      CORS_ALLOWED_ORIGINS:          ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SERVER_PORT:                   8080
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q 'UP' || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 3
    networks:
      - gridweaver-net

  # ---------------------------------------------------------------------------
  # Adminer — Database GUI (development only — remove in production)
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: gridweaver-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - gridweaver-net

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  gridweaver-net:
    driver: bridge
